<?xml version="1.0" encoding="UTF-8"?>
<svg id="marketplace-icon" width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
                        <defs>
                            <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" style="stop-color:#007acc;stop-opacity:1"/>
                                <stop offset="100%" style="stop-color:#005a9e;stop-opacity:1"/>
                            </linearGradient>
                            <linearGradient id="arrowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" style="stop-color:#00bcf2;stop-opacity:1"/>
                                <stop offset="100%" style="stop-color:#0099cc;stop-opacity:1"/>
                            </linearGradient>
                            <linearGradient id="glowGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                                <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.8"/>
                                <stop offset="100%" style="stop-color:#00bcf2;stop-opacity:0.3"/>
                            </linearGradient>
                        </defs>
                        
                        <!-- Background rounded square -->
                        <!-- <rect width="128" height="128" fill="url(#bgGrad)" rx="24"/> -->
                        
                        <!-- Globe/Network outline -->
                        <circle cx="64" cy="64" r="45" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="2"/>
                        <circle cx="64" cy="64" r="38" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1.5"/>
                        
                        <!-- Network lines -->
                        <ellipse cx="64" cy="64" rx="45" ry="20" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>
                        <ellipse cx="64" cy="64" rx="20" ry="45" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>
                        
                        <!-- Request arrow (top, going right) -->
                        <g transform="translate(64, 54)">
                            <path d="M -25 0 L 10 0 L 10 -6 L 22 6 L 10 18 L 10 12 L -25 12 Z" fill="url(#arrowGrad)" opacity="0.95"/>
                        </g>
                        
                        <!-- Response arrow (bottom, going left) -->
                        <g transform="translate(64, 74)">
                            <path d="M 25 0 L -10 0 L -10 -6 L -22 6 L -10 18 L -10 12 L 25 12 Z" fill="url(#glowGrad)" opacity="0.7"/>
                        </g>
                        
                        <!-- Connection dots -->
                        <circle cx="42" cy="64" r="3" fill="#00bcf2" opacity="0.8">
                            <animate attributeName="opacity" values="0.8;0.3;0.8" dur="2s" repeatCount="indefinite"/>
                        </circle>
                        <circle cx="86" cy="64" r="3" fill="#00bcf2" opacity="0.8">
                            <animate attributeName="opacity" values="0.3;0.8;0.3" dur="2s" repeatCount="indefinite"/>
                        </circle>
                    </svg>