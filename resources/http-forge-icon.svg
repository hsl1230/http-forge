<?xml version="1.0" encoding="UTF-8"?>
<svg id="main-icon" width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
                        <defs>
                            <linearGradient id="arrowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" style="stop-color:#00bcf2;stop-opacity:1"/>
                                <stop offset="100%" style="stop-color:#0099cc;stop-opacity:1"/>
                            </linearGradient>
                            <linearGradient id="glowGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                                <stop offset="0%" style="stop-color:#00bcf2;stop-opacity:1"/>
                                <stop offset="100%" style="stop-color:#0099cc;stop-opacity:1"/>
                            </linearGradient>
                        </defs>
                        
                        <!-- Globe/Network outline - ENLARGED -->
                        <circle cx="64" cy="64" r="60" fill="none" stroke="#007acc" stroke-width="3" opacity="0.8"/>
                        <circle cx="64" cy="64" r="52" fill="none" stroke="#007acc" stroke-width="2.5" opacity="0.5"/>
                        
                        <!-- Network lines - ENLARGED -->
                        <ellipse cx="64" cy="64" rx="60" ry="26" fill="none" stroke="#007acc" stroke-width="2.5" opacity="0.6"/>
                        <ellipse cx="64" cy="64" rx="26" ry="60" fill="none" stroke="#007acc" stroke-width="2.5" opacity="0.6"/>
                        
                        <!-- Request arrow (TOP, going right) - ENLARGED -->
                        <g transform="translate(64, 48)">
                            <path d="M -35 0 L 15 0 L 15 -8 L 30 8 L 15 24 L 15 16 L -35 16 Z" fill="url(#arrowGrad)" opacity="0.95"/>
                        </g>
                        
                        <!-- Response arrow (BOTTOM, going left) - ENLARGED -->
                        <g transform="translate(64, 80)">
                            <path d="M 35 0 L -15 0 L -15 -8 L -30 8 L -15 24 L -15 16 L 35 16 Z" fill="url(#glowGrad)" opacity="0.95"/>
                        </g>
                        
                        <!-- Connection dots - ENLARGED -->
                        <circle cx="30" cy="80" r="4" fill="#00bcf2" opacity="0.9">
                            <animate attributeName="opacity" values="0.9;0.4;0.9" dur="2s" repeatCount="indefinite"/>
                        </circle>
                        <circle cx="98" cy="64" r="4" fill="#00bcf2" opacity="0.9">
                            <animate attributeName="opacity" values="0.4;0.9;0.4" dur="2s" repeatCount="indefinite"/>
                        </circle>
                    </svg>