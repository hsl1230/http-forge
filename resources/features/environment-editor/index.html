<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Environment Settings</title>
    <link rel="stylesheet" href="{{sharedStyleUri}}">
    <script src="{{sharedScriptUri}}"></script>
    <link rel="stylesheet" href="{{styleUri}}">
</head>

<body>
    <div class="editor-root">
        <header class="editor-header">
            <h1>Environment Settings</h1>
        </header>

        <div class="editor-content">
            <!-- Main Editor Area -->
            <div class="main-editor full-width">
                <!-- Environment Details -->
                <div id="env-details" class="env-details">
                    <div class="details-header">
                        <h2 id="env-name-display">Select an environment</h2>
                        <div class="details-actions">
                            <button id="duplicate-env-btn" class="secondary" title="Duplicate">📋 Duplicate</button>
                            <button id="delete-env-btn" class="danger" title="Delete">🗑️ Delete</button>
                        </div>
                    </div>

                    <div class="details-content">
                        <!-- Environment Variables -->
                        <div class="form-group">
                            <div class="section-label-row">
                                <label>
                                    Variables
                                    <span class="label-hint">(Shared - committed to repo)</span>
                                </label>
                                <button id="open-env-btn" class="link-btn" title="Open environment config file (e.g., dev.json)">
                                    📂 Open Config
                                </button>
                            </div>
                            <div id="env-variables" class="variable-list"></div>
                            <button id="add-env-var-btn" class="add-btn">+ Add Variable</button>
                        </div>

                        <!-- Local Variables (Secrets) -->
                        <div class="form-group local-vars">
                            <div class="section-label-row">
                                <label>
                                    Local Variables
                                    <span class="label-hint">(Private - not committed)</span>
                                </label>
                                <button id="open-env-local-btn" class="link-btn" title="Open local config file (e.g., dev.local.json)">
                                    🔐 Open Config
                                </button>
                            </div>
                            <div id="env-local-variables" class="variable-list"></div>
                            <button id="add-local-var-btn" class="add-btn">+ Add Local Variable</button>
                        </div>
                    </div>
                </div>

                <!-- Global Variables Section -->
                <div id="global-vars-section" class="global-vars-section">
                    <div class="section-header-main">
                        <h2>Global Variables</h2>
                        <span class="hint">Available across all environments</span>
                    </div>

                    <div class="form-group">
                        <div class="section-label-row">
                            <label>Shared Global Variables</label>
                            <button id="open-shared-btn" class="link-btn" title="Open _global.json">
                                📄 Open Config
                            </button>
                        </div>
                        <div id="global-variables" class="variable-list"></div>
                        <button id="add-global-var-btn" class="add-btn">+ Add Global Variable</button>
                    </div>

                    <div class="form-group local-vars">
                        <div class="section-label-row">
                            <label>Local Global Variables <span class="label-hint">(not committed)</span></label>
                            <button id="open-local-btn" class="link-btn" title="Open _global.local.json">
                                🔐 Open Config
                            </button>
                        </div>
                        <div id="global-local-variables" class="variable-list"></div>
                        <button id="add-global-local-var-btn" class="add-btn">+ Add Local Global Variable</button>
                    </div>
                </div>

                <!-- Default Headers Section -->
                <div id="default-headers-section" class="default-headers-section">
                    <div class="section-header-main">
                        <h2>Default Headers</h2>
                        <span class="hint">Automatically added to all requests</span>
                    </div>

                    <div id="default-headers" class="variable-list"></div>
                    <button id="add-default-header-btn" class="add-btn">+ Add Header</button>
                </div>
            </div>
        </div>

        <footer class="editor-footer">
            <div class="footer-status" id="footer-status"></div>
            <div class="footer-actions">
                <button id="save-btn" class="primary">💾 Save All Changes</button>
            </div>
        </footer>
    </div>

    <script src="{{scriptUri}}"></script>
</body>

</html>
